services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "5000"
      # Overrides backend/.env — use root `.env` with MONGODB_URI=... for Atlas
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/trade-journal}
    env_file:
      - ./backend/.env
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  mongo_data:
